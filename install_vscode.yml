name: "Install VS Code"

tasks:
  - name: "[VSCode] Install silently"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Start-Process -FilePath "D:\Temp\VSCodeUserSetup-x64-1.123.0.exe" -ArgumentList "/VERYSILENT","/NORESTART","/MERGETASKS=!runcode,addcontextmenufiles,addcontextmenufolders,associatewithfiles,addtopath" -Wait
        Write-Host "VS Code installed"

  - name: "[VSCode] Verify installation"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        & "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd" --version

  - name: "[VSCode] Cleanup installer"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Temp\VSCodeUserSetup-x64-1.123.0.exe" -Force -ErrorAction SilentlyContinue
        Write-Host "Installer cleaned"

  - name: "[VSCode] Create desktop shortcut"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $exe = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\Code.exe"
        $shell = New-Object -ComObject WScript.Shell
        $shortcut = $shell.CreateShortcut("$env:USERPROFILE\Desktop\Visual Studio Code.lnk")
        $shortcut.TargetPath = $exe
        $shortcut.IconLocation = "$exe,0"
        $shortcut.Description = "Visual Studio Code"
        $shortcut.Save()
        Write-Host "VS Code desktop shortcut created"

  - name: "[VSCode] Installation complete"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "VS Code 1.123.0 successfully installed"
