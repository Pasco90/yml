name: "Install DBeaver"

# ============================================================
#  L'installeur DBeaver ouvre un wizard (pas de mode silencieux
#  fiable). Le playbook lance l'installeur ; l'utilisateur clique
#  a travers : langue -> Next -> Install -> Finish.
#  Installer dans le dossier propose par defaut :
#    D:\Users\<user>\AppData\Local\DBeaver
# ============================================================

tasks:
  - name: "[DBeaver] Run installer (interactive)"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $installer = "D:\Temp\dbeaver-ce-26.1.0-windows-x86_64.exe"
        Write-Host "Lancement de l'installeur DBeaver - suivre le wizard (Next / Install / Finish)"
        Start-Process -FilePath $installer -Wait
        Write-Host "Installeur DBeaver termine"

  - name: "[DBeaver] Create desktop shortcut"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $exe = "$env:LOCALAPPDATA\DBeaver\dbeaver.exe"
        if (Test-Path $exe) {
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut("$env:USERPROFILE\Desktop\DBeaver.lnk")
          $shortcut.TargetPath = $exe
          $shortcut.IconLocation = "$exe,0"
          $shortcut.Description = "DBeaver Community"
          $shortcut.Save()
          Write-Host "DBeaver desktop shortcut created"
        } else {
          Write-Host "dbeaver.exe not found - shortcut skipped"
        }

  - name: "[DBeaver] Cleanup installer"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Temp\dbeaver-ce-26.1.0-windows-x86_64.exe" -Force -ErrorAction SilentlyContinue
        Write-Host "Installer cleaned"

  - name: "[DBeaver] Verify installation"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $exe = "$env:LOCALAPPDATA\DBeaver\dbeaver.exe"
        if (Test-Path $exe) {
          Write-Host "DBeaver successfully found at $exe"
        } else {
          Write-Host "DBeaver NOT found"
          exit 1
        }

  - name: "[DBeaver] Installation complete"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "DBeaver CE 26.1.0 installed"
