name: "Clean installation"

tasks:
  - name: "[Clean] Remove Java"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path 'C:\Program Files\Java' -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*Java*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'Machine')
        [System.Environment]::SetEnvironmentVariable('JAVA_HOME', $null, 'Machine')
        Write-Host "Java removed"

  - name: "[Clean] Remove IntelliJ"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path 'C:\Program Files\JetBrains' -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:APPDATA\JetBrains" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:LOCALAPPDATA\JetBrains" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*JetBrains*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'Machine')
        Remove-Item -Path "C:\Users\Public\Desktop\IntelliJ IDEA.lnk" -Force -ErrorAction SilentlyContinue
        Write-Host "IntelliJ removed"

  - name: "[Clean] Remove npkm and nuke"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path 'C:\Program Files\npkm' -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*npkm*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'Machine')
        Write-Host "npkm and nuke removed"

  - name: "[Clean] Remove VS Code"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path 'C:\Program Files\Microsoft VS Code' -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:APPDATA\Code" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:USERPROFILE\.vscode" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*VS Code*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'Machine')
        Remove-Item -Path "C:\Users\Public\Desktop\Visual Studio Code.lnk" -Force -ErrorAction SilentlyContinue
        Write-Host "VS Code removed"

  - name: "[Clean] Remove DBeaver"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path 'C:\Program Files\DBeaver' -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:APPDATA\DBeaverData" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*DBeaver*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'Machine')
        Write-Host "DBeaver removed"

  - name: "[Clean] Remove Nexus configuration"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "$env:USERPROFILE\.m2\settings.xml" -Force -ErrorAction SilentlyContinue
        Write-Host "Nexus configuration removed"

  - name: "[Clean] Remove temp files"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path 'C:\Temp' -Recurse -Force -ErrorAction SilentlyContinue
        Write-Host "Temp files removed"

  - name: "[Clean] Done"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "Clean complete - Java, Maven, IntelliJ, npkm, nuke, VS Code, DBeaver, Nexus and temp files removed"
