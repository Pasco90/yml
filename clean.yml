name: "Clean installation"

tasks:
  - name: "[Clean] Remove Java"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Program Files\Java" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*Java*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'User')
        [System.Environment]::SetEnvironmentVariable('JAVA_HOME', $null, 'User')
        Write-Host "Java removed"

  - name: "[Clean] Remove IntelliJ"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Stop-Process -Name idea64 -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        Remove-Item -Path "D:\Tools\IntelliJ IDEA" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:APPDATA\JetBrains" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:LOCALAPPDATA\JetBrains" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*IntelliJ*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'User')
        Remove-Item -Path "$env:USERPROFILE\Desktop\IntelliJ IDEA.lnk" -Force -ErrorAction SilentlyContinue
        Write-Host "IntelliJ removed"

  - name: "[Clean] Remove npkm and nuke"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Tools\npkm" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "D:\Tools\nuke" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        $updated = ($current -split ';' | Where-Object { ($_ -notlike '*\npkm*') -and ($_ -notlike '*\nuke*') }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'User')
        Write-Host "npkm and nuke removed"

  - name: "[Clean] Remove VS Code"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Stop-Process -Name Code -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        Remove-Item -Path "$env:LOCALAPPDATA\Programs\Microsoft VS Code" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:APPDATA\Code" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:USERPROFILE\.vscode" -Recurse -Force -ErrorAction SilentlyContinue
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        $updated = ($current -split ';' | Where-Object { $_ -notlike '*VS Code*' }) -join ';'
        [System.Environment]::SetEnvironmentVariable('Path', $updated, 'User')
        Remove-Item -Path "$env:USERPROFILE\Desktop\Visual Studio Code.lnk" -Force -ErrorAction SilentlyContinue
        Write-Host "VS Code removed"

  - name: "[Clean] Remove DBeaver"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Stop-Process -Name dbeaver -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 2
        Remove-Item -Path "$env:LOCALAPPDATA\DBeaver" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:APPDATA\DBeaverData" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$env:USERPROFILE\Desktop\DBeaver.lnk" -Force -ErrorAction SilentlyContinue
        Write-Host "DBeaver removed"

  - name: "[Clean] Remove Nexus configuration"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "$env:USERPROFILE\.m2\settings.xml" -Force -ErrorAction SilentlyContinue
        Write-Host "Nexus configuration removed"

  - name: "[Clean] Remove temp files"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Temp" -Recurse -Force -ErrorAction SilentlyContinue
        Write-Host "Temp files removed"

  - name: "[Clean] Unmount S: drive"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        & subst S: /d 2>$null
        Write-Host "S: unmounted"

  - name: "[Clean] Done"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "Clean complete - Java, IntelliJ, npkm, nuke, VS Code, DBeaver, Nexus and temp files removed"
