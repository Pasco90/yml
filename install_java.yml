name: "Install Java 21"

tasks:
  - name: "[Java 21] Create installation directory"
    when: "ansible_os_family == 'Windows'"
    file:
      path: D:\Program Files\Java
      state: directory

  - name: "[Java 21] Extract archive"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Expand-Archive -Path "D:\Temp\jdk21.0.8_9.zip" -DestinationPath "D:\Program Files\Java" -Force
        Write-Host "Archive extracted"

  - name: "[Java 21] Add to user PATH"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        # Detection dynamique du dossier jdk extrait
        $jdkDir = Get-ChildItem -Path "D:\Program Files\Java" -Directory | Where-Object { $_.Name -like "jdk*" } | Select-Object -First 1
        $bin = "$($jdkDir.FullName)\bin"
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        if ($current -notlike "*$bin*") {
          [System.Environment]::SetEnvironmentVariable('Path', $current + ";$bin", 'User')
          Write-Host "PATH updated successfully ($bin)"
        } else {
          Write-Host "PATH already contains Java 21"
        }

  - name: "[Java 21] Set JAVA_HOME (user)"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $jdkDir = Get-ChildItem -Path "D:\Program Files\Java" -Directory | Where-Object { $_.Name -like "jdk*" } | Select-Object -First 1
        [System.Environment]::SetEnvironmentVariable('JAVA_HOME', $jdkDir.FullName, 'User')
        Write-Host "JAVA_HOME set to $($jdkDir.FullName)"

  - name: "[Java 21] Cleanup archive"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Temp\jdk21.0.8_9.zip" -Force -ErrorAction SilentlyContinue
        Write-Host "Archive cleaned"

  - name: "[Java 21] Verify installation"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $jdkDir = Get-ChildItem -Path "D:\Program Files\Java" -Directory | Where-Object { $_.Name -like "jdk*" } | Select-Object -First 1
        $java = "$($jdkDir.FullName)\bin\java.exe"
        if (Test-Path $java) {
          $v = & $java -version 2>&1
          Write-Host $v
        } else {
          Write-Host "java.exe NOT found"
          exit 1
        }

  - name: "[Java 21] Installation complete"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "OpenJDK 21 successfully installed under D:\\Program Files\\Java"
