name: "Install npkm-coni / nuke"

tasks:
  - name: "[npkm-coni] Create installation directory"
    when: "ansible_os_family == 'Windows'"
    file:
      path: D:\Tools\npkm
      state: directory

  - name: "[npkm-coni] Copy executable"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Copy-Item -Path "D:\Temp\npkm-coni.exe" -Destination "D:\Tools\npkm\npkm.exe" -Force
        Write-Host "npkm-coni.exe copied"

  - name: "[nuke] Create installation directory"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        New-Item -ItemType Directory -Path "D:\Tools\nuke" -Force | Out-Null
        Write-Host "nuke directory created"

  - name: "[nuke] Copy nuke executable"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Copy-Item -Path "D:\Temp\nuke.exe" -Destination "D:\Tools\nuke\nuke.exe" -Force
        Write-Host "nuke.exe copied"

  - name: "[npkm-coni] Add npkm to user PATH"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $bin = "D:\Tools\npkm"
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        if ($current -notlike "*$bin*") {
          [System.Environment]::SetEnvironmentVariable('Path', $current + ";$bin", 'User')
          Write-Host "PATH updated with npkm"
        } else {
          Write-Host "PATH already contains npkm"
        }

  - name: "[nuke] Add nuke to user PATH"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $bin = "D:\Tools\nuke"
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        if ($current -notlike "*$bin*") {
          [System.Environment]::SetEnvironmentVariable('Path', $current + ";$bin", 'User')
          Write-Host "PATH updated with nuke"
        } else {
          Write-Host "PATH already contains nuke"
        }

  - name: "[npkm-coni] Verify installation"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        & "D:\Tools\npkm\npkm.exe" --version
        & "D:\Tools\nuke\nuke.exe" --version

  - name: "[npkm-coni] Cleanup temp files"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Temp\npkm-coni.exe" -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "D:\Temp\nuke.exe" -Force -ErrorAction SilentlyContinue
        Write-Host "Temp files cleaned"

  - name: "[npkm-coni] Installation complete"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "npkm-coni and nuke installed successfully under D:\\Tools"
