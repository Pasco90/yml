name: "Install IntelliJ IDEA (portable folder)"

# ============================================================
#  IntelliJ n'est PAS installe via un exe.
#  Le dossier "S:\IntelliJ IDEA" est une installation portable
#  realisee sur un autre PC : on le copie tel quel vers D:\Tools.
#  (S: doit etre monte par setup.bat)
# ============================================================

tasks:
  - name: "[IntelliJ] Create Tools directory"
    when: "ansible_os_family == 'Windows'"
    file:
      path: D:\Tools
      state: directory

  - name: "[IntelliJ] Copy portable installation from share"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $source = "S:\IntelliJ IDEA"
        $target = "D:\Tools\IntelliJ IDEA"
        if (Test-Path $target) {
          Remove-Item -Path $target -Recurse -Force -ErrorAction SilentlyContinue
        }
        Copy-Item -Path $source -Destination $target -Recurse -Force
        Write-Host "IntelliJ portable folder copied to $target"

  - name: "[IntelliJ] Add to user PATH"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $bin = "D:\Tools\IntelliJ IDEA\bin"
        $current = [System.Environment]::GetEnvironmentVariable('Path', 'User')
        if ($current -notlike "*$bin*") {
          [System.Environment]::SetEnvironmentVariable('Path', $current + ";$bin", 'User')
          Write-Host "PATH updated successfully"
        } else {
          Write-Host "PATH already contains IntelliJ"
        }

  - name: "[IntelliJ] Install NPKM plugin"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $pluginPath = "D:\Temp\npkm-intellij-plugin-1.0.0.zip"
        $pluginsDir = "$env:APPDATA\JetBrains\IntelliJIdea2026.1\plugins"
        if (!(Test-Path $pluginsDir)) {
          New-Item -ItemType Directory -Path $pluginsDir -Force | Out-Null
        }
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory($pluginPath, $pluginsDir)
        Write-Host "NPKM plugin installed in: $pluginsDir"

  - name: "[IntelliJ] Install Nuke plugin"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $pluginPath = "D:\Temp\nuke-intellij-plugin-1.0.0.zip"
        $pluginsDir = "$env:APPDATA\JetBrains\IntelliJIdea2026.1\plugins"
        if (!(Test-Path $pluginsDir)) {
          New-Item -ItemType Directory -Path $pluginsDir -Force | Out-Null
        }
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory($pluginPath, $pluginsDir)
        Write-Host "Nuke plugin installed in: $pluginsDir"

  - name: "[IntelliJ] Create desktop shortcut"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $exe = "D:\Tools\IntelliJ IDEA\bin\idea64.exe"
        $shell = New-Object -ComObject WScript.Shell
        $shortcut = $shell.CreateShortcut("$env:USERPROFILE\Desktop\IntelliJ IDEA.lnk")
        $shortcut.TargetPath = $exe
        $shortcut.IconLocation = "$exe,0"
        $shortcut.Description = "IntelliJ IDEA"
        $shortcut.Save()
        Write-Host "Desktop shortcut created"

  - name: "[IntelliJ] Cleanup plugin zips"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        Remove-Item -Path "D:\Temp\npkm-intellij-plugin-1.0.0.zip" -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "D:\Temp\nuke-intellij-plugin-1.0.0.zip" -Force -ErrorAction SilentlyContinue
        Write-Host "Plugin zips cleaned"

  - name: "[IntelliJ] Verify installation"
    when: "ansible_os_family == 'Windows'"
    powershell:
      inline: |
        $exe = "D:\Tools\IntelliJ IDEA\bin\idea64.exe"
        if (Test-Path $exe) {
          Write-Host "IntelliJ IDEA successfully found at $exe"
        } else {
          Write-Host "IntelliJ IDEA NOT found"
          exit 1
        }

  - name: "[IntelliJ] Installation complete"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "IntelliJ IDEA (portable) successfully installed at D:\\Tools\\IntelliJ IDEA"
