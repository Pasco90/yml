name: "Copy of installation files"

# ============================================================
#  PRE-REQUIS : lancer setup.bat AVANT ce playbook.
#  setup.bat monte le partage japonais sur S:.
#
#  Ordre de deploiement sur chaque poste :
#    1) .\setup.bat
#    2) npkm-coni .\main.yml
#
#  NOTE : IntelliJ n'est PAS installe via un exe.
#  C'est une installation portable (faite sur un autre PC) :
#  on copie le dossier "S:\IntelliJ IDEA" tel quel.
# ============================================================

config:
  # Fichiers (exe / zip) a installer ou extraire
  binaries_windows:
    - Git-2.54.0-64-bit.exe
    - jdk21.0.8_9.zip
    - npkm-coni.exe
    - npkm-intellij-plugin-1.0.0.zip
    - nuke-intellij-plugin-1.0.0.zip
    - nuke.exe
    - VSCodeUserSetup-x64-1.123.0.exe

tasks:
  - name: "GLOBAL - Create temp directory"
    when: "ansible_os_family == 'Windows'"
    file:
      path: D:\Temp
      state: directory

  - name: "COPY - Fetching binary files from share (S:)"
    when: "ansible_os_family == 'Windows'"
    copy:
      src: "S:\\{{ item }}"
      dest: "D:\\Temp\\{{ item }}"
    loop: config.binaries_windows

  - name: "LOG Files copied successfully"
    when: "ansible_os_family == 'Windows'"
    debug:
      msg: "{{ item }} copied successfully"
    loop: config.binaries_windows

  - name: "RUN install-path"
    include_tasks: install_path.yml

  - name: "RUN install-java"
    include_tasks: install_java.yml

  - name: "RUN install-intellij"
    include_tasks: install_intellij.yml

  - name: "RUN install-vscode"
    include_tasks: install_vscode.yml

  - name: "RUN install-dbeaver"
    include_tasks: install_dbeaver.yml
